<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Honor Bound Barber Supply</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ── SHOP LAYOUT ── */
.shop-wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:260px 1fr;gap:40px;align-items:start;}

/* sidebar */
.sidebar{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:28px;box-shadow:var(--card-shadow);position:sticky;top:92px;}
.sidebar-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.filter-group{margin-bottom:24px;}
.filter-label{font-family:'Cinzel',serif;font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:block;}
.filter-btn{display:block;width:100%;text-align:left;background:none;border:none;padding:8px 12px;border-radius:4px;font-family:'Lato',sans-serif;font-size:14px;color:var(--text-secondary);cursor:pointer;transition:all .2s;margin-bottom:4px;}
.filter-btn:hover,.filter-btn.active{background:rgba(201,168,76,.12);color:var(--gold);font-weight:700;}
.filter-btn .count{float:right;font-size:11px;color:var(--text-muted);background:var(--bg-secondary);padding:2px 6px;border-radius:10px;}
.price-inputs{display:flex;gap:8px;align-items:center;}
.price-input{width:80px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:13px;color:var(--text-primary);outline:none;}
.price-input:focus{border-color:var(--gold);}
.price-sep{color:var(--text-muted);font-size:13px;}

/* search bar */
.shop-search-row{display:flex;gap:12px;align-items:center;margin-bottom:28px;flex-wrap:wrap;}
.search-input-wrap{flex:1;position:relative;min-width:200px;}
.search-input-wrap span{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.shop-search{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:11px 14px 11px 40px;font-family:'Lato',sans-serif;font-size:14px;color:var(--text-primary);outline:none;transition:border-color .2s;}
.shop-search:focus{border-color:var(--gold);}
.sort-select{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:11px 14px;font-family:'Lato',sans-serif;font-size:13px;color:var(--text-primary);outline:none;cursor:pointer;}

/* results bar */
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.results-count{font-size:13px;color:var(--text-muted);font-style:italic;}
.view-toggle{display:flex;gap:6px;}
.vt-btn{background:none;border:1px solid var(--border);border-radius:4px;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .2s;}
.vt-btn.active,.vt-btn:hover{border-color:var(--gold);color:var(--gold);}

/* product grid */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px;}
.products-grid.list-view{grid-template-columns:1fr;}

/* product card */
.product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--card-shadow);transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column;}
.product-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(13,27,62,.2);}
.product-card.list-card{flex-direction:row;}
.prod-img-wrap{position:relative;height:170px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));display:flex;align-items:center;justify-content:center;font-size:52px;flex-shrink:0;}
.list-card .prod-img-wrap{width:160px;height:auto;}
.prod-badge{position:absolute;top:10px;left:10px;background:var(--gold);color:var(--navy);font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.07em;padding:3px 9px;border-radius:2px;text-transform:uppercase;}
.prod-badge.new{background:var(--red)!important;color:#fff!important;}
.prod-badge.sale{background:#1a7a2e!important;color:#fff!important;}
.wishlist-btn{position:absolute;top:10px;right:10px;background:rgba(13,27,62,.6);border:1px solid rgba(201,168,76,.3);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s;}
.wishlist-btn:hover,.wishlist-btn.liked{background:rgba(184,32,32,.7);border-color:var(--red);}

.prod-body{padding:18px;flex:1;display:flex;flex-direction:column;}
.prod-cat{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px;}
.prod-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:6px;line-height:1.3;}
.prod-desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:12px;flex:1;}
.prod-rating{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.prod-stars{color:var(--gold);font-size:12px;}
.prod-review-count{font-size:11px;color:var(--text-muted);}
.prod-price-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.prod-price{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);}
.prod-price-old{font-size:13px;color:var(--text-muted);text-decoration:line-through;}
.prod-actions{display:flex;gap:8px;}
.btn-add{flex:1;background:var(--navy);color:var(--gold-light);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px;border:1px solid var(--gold-dark);border-radius:3px;cursor:pointer;transition:all .2s;}
.btn-add:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.btn-req{background:none;color:var(--gold-dark);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 12px;border:1px solid var(--gold-dark);border-radius:3px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-req:hover{color:var(--gold);border-color:var(--gold);}
[data-theme="dark"] .btn-add{background:var(--navy-light);}

/* cart drawer */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.cart-overlay.open{opacity:1;pointer-events:all;}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:100vw;background:var(--bg-card);z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 32px rgba(0,0,0,.3);}
.cart-drawer.open{transform:translateX(0);}
.cart-header{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy);}
.cart-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold-light);}
.cart-close{background:none;border:none;color:var(--silver);font-size:22px;cursor:pointer;line-height:1;}
.cart-body{flex:1;overflow-y:auto;padding:20px 24px;}
.cart-empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.cart-empty-icon{font-size:48px;margin-bottom:14px;}
.cart-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.cart-item-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.cart-item-info{flex:1;}
.cart-item-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
.cart-item-price{font-size:13px;color:var(--gold);font-weight:700;}
.cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{background:var(--bg-secondary);border:1px solid var(--border);border-radius:3px;width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text-primary);transition:background .15s;}
.qty-btn:hover{background:var(--gold);color:var(--navy);}
.qty-val{font-size:14px;font-weight:700;color:var(--text-primary);min-width:20px;text-align:center;}
.cart-remove{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;transition:color .15s;}
.cart-remove:hover{color:var(--red);}
.cart-footer{padding:20px 24px;border-top:1px solid var(--border);}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:16px;}
.cart-total-label{font-family:'Cinzel',serif;font-size:14px;color:var(--text-secondary);}
.cart-total-val{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);}
.btn-checkout{width:100%;background:var(--gold);color:var(--navy);font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:14px;border:none;border-radius:4px;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.btn-checkout:hover{background:var(--gold-light);}
.btn-request-all{width:100%;background:transparent;color:var(--gold-light);font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:11px;border:1px solid var(--gold-dark);border-radius:4px;cursor:pointer;transition:all .2s;}
.btn-request-all:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}

/* cart icon in nav */
.cart-icon-btn{background:none;border:1px solid var(--gold-dark);color:var(--gold-light);cursor:pointer;padding:6px 14px;border-radius:4px;font-family:'Cinzel',serif;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s;}
.cart-icon-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}
.cart-count{background:var(--gold);color:var(--navy);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;}

/* empty state */
.no-results{grid-column:1/-1;text-align:center;padding:80px 20px;}
.no-results-icon{font-size:52px;margin-bottom:14px;}
.no-results-title{font-family:'Cinzel',serif;font-size:20px;color:var(--text-primary);margin-bottom:8px;}
.no-results-sub{font-size:14px;color:var(--text-muted);}

@media(max-width:900px){
  .shop-wrap{grid-template-columns:1fr;}
  .sidebar{position:static;}
}
@media(max-width:600px){
  .products-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-hero">
  <p class="page-hero-eyebrow">Full Catalog</p>
  <h1 class="page-hero-title">The Shop</h1>
  <p class="page-hero-sub">Professional Barber Supplies</p>
  <div class="hero-rule"><div class="hero-rule-dot"></div></div>
</div>

<section style="padding:60px 2rem;">
  <div class="shop-wrap">

    <!-- SIDEBAR -->
    <aside class="sidebar reveal">
      <p class="sidebar-title">Filter Products</p>

      <div class="filter-group">
        <span class="filter-label">Category</span>
        <button class="filter-btn active" data-cat="all">All Products <span class="count" id="cnt-all">18</span></button>
        <button class="filter-btn" data-cat="clippers">Clippers &amp; Trimmers <span class="count" id="cnt-clippers">5</span></button>
        <button class="filter-btn" data-cat="grooming">Grooming Products <span class="count" id="cnt-grooming">4</span></button>
        <button class="filter-btn" data-cat="accessories">Shop Accessories <span class="count" id="cnt-accessories">4</span></button>
        <button class="filter-btn" data-cat="maintenance">Maintenance Kits <span class="count" id="cnt-maintenance">3</span></button>
        <button class="filter-btn" data-cat="bundles">Bundles <span class="count" id="cnt-bundles">2</span></button>
      </div>

      <div class="filter-group">
        <span class="filter-label">Price Range</span>
        <div class="price-inputs">
          <input class="price-input" id="priceMin" type="number" placeholder="$0" min="0">
          <span class="price-sep">—</span>
          <input class="price-input" id="priceMax" type="number" placeholder="$500" min="0">
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Availability</span>
        <button class="filter-btn active" data-avail="all">All Items</button>
        <button class="filter-btn" data-avail="instock">In Stock Only</button>
        <button class="filter-btn" data-avail="sale">On Sale</button>
      </div>

      <button class="btn-outline" id="clearFilters" style="width:100%;text-align:center;font-size:11px;padding:10px;">Clear Filters</button>
    </aside>

    <!-- MAIN CONTENT -->
    <div>
      <div class="shop-search-row">
        <div class="search-input-wrap">
          <span>🔍</span>
          <input class="shop-search" id="shopSearch" placeholder="Search products...">
        </div>
        <select class="sort-select" id="shopSort">
          <option value="default">Sort: Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
          <option value="newest">Newest First</option>
        </select>
        <div class="view-toggle">
          <button class="vt-btn active" id="gridViewBtn" title="Grid view">⊞</button>
          <button class="vt-btn" id="listViewBtn" title="List view">☰</button>
        </div>
      </div>

      <div class="results-bar">
        <p class="results-count" id="resultsCount">Showing 18 products</p>
      </div>

      <div class="products-grid" id="productsGrid"></div>
    </div>
  </div>
</section>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <span class="cart-title">🛒 Your Cart</span>
    <button class="cart-close" id="cartClose">✕</button>
  </div>
  <div class="cart-body" id="cartBody"></div>
  <div class="cart-footer" id="cartFooter" style="display:none;">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cartTotal">$0.00</span>
    </div>
    <button class="btn-checkout" onclick="showToast('🔜 Checkout coming in Phase 2! For now, use Request Supply.');closeCart();">Checkout →</button>
    <button class="btn-request-all" onclick="window.location='index.html#request';closeCart();">Request via Supply Form</button>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="shared.js"></script>
<script>
const PRODUCTS = [
  { id:1, name:'Professional Clippers Pro X', cat:'clippers', price:89.99, rating:4.9, reviews:142, badge:'Bestseller', icon:'💈', desc:'Precision-engineered for fade mastery. Titanium blades stay cool through full sets.', inStock:true, isNew:false, isSale:false },
  { id:2, name:'Cordless Trimmers Elite', cat:'clippers', price:64.99, rating:4.8, reviews:98, badge:'New', icon:'⚡', desc:'Zero-gap detailing with all-day battery life. Razor-sharp edges every time.', inStock:true, isNew:true, isSale:false },
  { id:3, name:'Heavy-Duty Clippers HX', cat:'clippers', price:119.99, oldPrice:149.99, rating:4.7, reviews:76, badge:'Sale', icon:'🔋', desc:'Built for marathon sessions. Motor never overheats. Industry-grade performance.', inStock:true, isNew:false, isSale:true },
  { id:4, name:'Detailing Trimmers Mini', cat:'clippers', price:44.99, rating:4.6, reviews:55, badge:null, icon:'✏️', desc:'Compact and precise. Perfect for hairlines, beards, and detail work.', inStock:true, isNew:false, isSale:false },
  { id:5, name:'Foil Shaver Pro', cat:'clippers', price:72.99, rating:4.5, reviews:34, badge:null, icon:'🪒', desc:'Ultra-close shave with multi-flex head. Cordless and rechargeable.', inStock:false, isNew:false, isSale:false },
  { id:6, name:'Matte Pomade 4oz', cat:'grooming', price:14.99, rating:4.8, reviews:203, badge:'Bestseller', icon:'🧴', desc:'Strong hold, natural finish. Water-based, washes clean. Clients keep asking for it.', inStock:true, isNew:false, isSale:false },
  { id:7, name:'Beard Oil Blend 2oz', cat:'grooming', price:12.99, rating:4.7, reviews:167, badge:null, icon:'🌿', desc:'Premium blend of argan, jojoba, and vitamin E. Conditions and softens.', inStock:true, isNew:false, isSale:false },
  { id:8, name:'Aftershave Splash', cat:'grooming', price:18.99, rating:4.6, reviews:89, badge:'New', icon:'💦', desc:'Antiseptic and cooling. Leaves skin smooth and refreshed post-shave.', inStock:true, isNew:true, isSale:false },
  { id:9, name:'Grooming Kit (3-Pack)', cat:'grooming', price:39.99, oldPrice:49.99, rating:4.9, reviews:112, badge:'Sale', icon:'🎁', desc:'Pomade + Beard Oil + Aftershave. Best seller combo. Great for retail.', inStock:true, isNew:false, isSale:true },
  { id:10, name:'Professional Barber Cape', cat:'accessories', price:24.99, rating:4.7, reviews:88, badge:null, icon:'🧣', desc:'Lightweight polyester blend. Snap closure, one size fits all clients.', inStock:true, isNew:false, isSale:false },
  { id:11, name:'Neck Strip Rolls (500ct)', cat:'accessories', price:9.99, rating:4.8, reviews:211, badge:'Bestseller', icon:'🧻', desc:'Soft and hypoallergenic. Fits all neck dusters. Case of 500 strips.', inStock:true, isNew:false, isSale:false },
  { id:12, name:'Barbicide Disinfectant', cat:'accessories', price:16.99, rating:4.9, reviews:178, badge:null, icon:'🧫', desc:'Industry-standard disinfecting concentrate for combs, scissors, and tools.', inStock:true, isNew:false, isSale:false },
  { id:13, name:'Spray Bottle Set (3pk)', cat:'accessories', price:11.99, rating:4.5, reviews:62, badge:null, icon:'💧', desc:'Fine mist and stream adjustable nozzles. Durable and chemical-resistant.', inStock:true, isNew:false, isSale:false },
  { id:14, name:'Blade Maintenance Kit', cat:'maintenance', price:29.99, rating:4.8, reviews:94, badge:null, icon:'🔧', desc:'Clipper oil, alignment screwdrivers, cleaning brushes, and blade wash.', inStock:true, isNew:false, isSale:false },
  { id:15, name:'Clipper Blade Oil 4oz', cat:'maintenance', price:8.99, rating:4.7, reviews:155, badge:null, icon:'🛢️', desc:'Zero-residue blade lubricant. Extends blade life and prevents rust.', inStock:true, isNew:false, isSale:false },
  { id:16, name:'Zero-Gap Alignment Tool', cat:'maintenance', price:19.99, rating:4.6, reviews:47, badge:'New', icon:'⚙️', desc:'Magnetic precision alignment for all major clipper brands.', inStock:true, isNew:true, isSale:false },
  { id:17, name:'New Barber Starter Bundle', cat:'bundles', price:199.99, oldPrice:269.99, rating:5.0, reviews:38, badge:'Bundle', icon:'📦', desc:'Everything to launch your career: clippers, trimmers, maintenance kit, cape, grooming set.', inStock:true, isNew:false, isSale:true },
  { id:18, name:'Shop Owner Pro Bundle', cat:'bundles', price:349.99, oldPrice:449.99, rating:4.9, reviews:22, badge:'Bundle', icon:'🏪', desc:'Outfit your whole shop. Bulk supplies, display products, and maintenance essentials.', inStock:true, isNew:false, isSale:true },
];

let cart = [];
let activeFilter = 'all';
let activeAvail = 'all';
let isListView = false;

function getFiltered() {
  let items = [...PRODUCTS];
  const q = document.getElementById('shopSearch').value.toLowerCase();
  const minP = parseFloat(document.getElementById('priceMin').value) || 0;
  const maxP = parseFloat(document.getElementById('priceMax').value) || 99999;
  const sort = document.getElementById('shopSort').value;

  if (activeFilter !== 'all') items = items.filter(p => p.cat === activeFilter);
  if (activeAvail === 'instock') items = items.filter(p => p.inStock);
  if (activeAvail === 'sale') items = items.filter(p => p.isSale);
  if (q) items = items.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
  items = items.filter(p => p.price >= minP && p.price <= maxP);

  if (sort === 'price-asc') items.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') items.sort((a,b) => b.price - a.price);
  else if (sort === 'rating') items.sort((a,b) => b.rating - a.rating);
  else if (sort === 'newest') items.sort((a,b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));

  return items;
}

function renderProducts() {
  const items = getFiltered();
  const grid = document.getElementById('productsGrid');
  document.getElementById('resultsCount').textContent = `Showing ${items.length} product${items.length !== 1 ? 's' : ''}`;

  if (!items.length) {
    grid.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><h3 class="no-results-title">No products found</h3><p class="no-results-sub">Try adjusting your filters or search term.</p></div>`;
    return;
  }

  grid.innerHTML = items.map(p => {
    const badgeHtml = p.badge ? `<span class="prod-badge ${p.isNew?'new':''} ${p.isSale?'sale':''}">${p.badge}</span>` : '';
    const stockLabel = p.inStock ? '' : '<span style="color:#b82020;font-size:11px;font-weight:700;"> · Out of Stock</span>';
    const oldPrice = p.oldPrice ? `<span class="prod-price-old">$${p.oldPrice.toFixed(2)}</span>` : '';
    const addBtn = p.inStock
      ? `<button class="btn-add" onclick="addToCart(${p.id})">Add to Cart</button>`
      : `<button class="btn-add" disabled style="opacity:.4;cursor:not-allowed;">Out of Stock</button>`;

    return `<div class="product-card ${isListView ? 'list-card' : ''} reveal">
      <div class="prod-img-wrap">
        <span style="font-size:${isListView?'40px':'52px'}">${p.icon}</span>
        ${badgeHtml}
        <button class="wishlist-btn" onclick="toggleWish(this)" title="Save">♡</button>
      </div>
      <div class="prod-body">
        <p class="prod-cat">${p.cat.replace('accessories','Shop Accessories').replace('clippers','Clippers & Trimmers').replace('grooming','Grooming').replace('maintenance','Maintenance').replace('bundles','Bundles')}</p>
        <p class="prod-name">${p.name}${stockLabel}</p>
        <p class="prod-desc">${p.desc}</p>
        <div class="prod-rating">
          <span class="prod-stars">${'★'.repeat(Math.floor(p.rating))}${p.rating % 1 ? '½' : ''}</span>
          <span class="prod-review-count">(${p.reviews} reviews)</span>
        </div>
        <div class="prod-price-row">
          <span class="prod-price">$${p.price.toFixed(2)}</span>
          ${oldPrice}
        </div>
        <div class="prod-actions">
          ${addBtn}
          <button class="btn-req" onclick="window.location='index.html#request'">Request</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // re-init reveal on new cards
  document.querySelectorAll('.reveal:not(.visible)').forEach((el,i) => {
    setTimeout(() => el.classList.add('visible'), i * 40);
  });
}

function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartUI();
  openCart();
  showToast(`🛒 ${p.name} added!`);
}

function toggleWish(btn) {
  btn.classList.toggle('liked');
  btn.textContent = btn.classList.contains('liked') ? '♥' : '♡';
  showToast(btn.classList.contains('liked') ? '♥ Saved to wishlist' : '♡ Removed from wishlist');
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const count = cart.reduce((s, i) => s + i.qty, 0);

  // update badge
  document.querySelectorAll('.cart-count').forEach(el => el.textContent = count);

  const body = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');

  if (!cart.length) {
    body.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p style="font-family:'Cinzel',serif;color:var(--text-muted)">Your cart is empty</p></div>`;
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'block';
  document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);

  body.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="cart-item-icon">${item.icon}</div>
      <div class="cart-item-info">
        <p class="cart-item-name">${item.name}</p>
        <p class="cart-item-price">$${item.price.toFixed(2)}</p>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
        </div>
      </div>
      <button class="cart-remove" onclick="removeFromCart(${idx})">✕</button>
    </div>`).join('');
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
}
function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartUI();
}
function openCart() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}

// ── EVENT LISTENERS ──
document.addEventListener('DOMContentLoaded', () => {
  buildNav('Shop');
  buildFooter();

  // inject cart button into nav after it's built
  setTimeout(() => {
    const actions = document.querySelector('.nav-actions');
    const cartBtn = document.createElement('button');
    cartBtn.className = 'cart-icon-btn';
    cartBtn.innerHTML = '🛒 Cart <span class="cart-count">0</span>';
    cartBtn.onclick = openCart;
    actions.prepend(cartBtn);
  }, 0);

  renderProducts();
  updateCartUI();

  // filters
  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.cat;
      renderProducts();
    });
  });
  document.querySelectorAll('[data-avail]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-avail]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeAvail = btn.dataset.avail;
      renderProducts();
    });
  });
  document.getElementById('shopSearch').addEventListener('input', renderProducts);
  document.getElementById('shopSort').addEventListener('change', renderProducts);
  document.getElementById('priceMin').addEventListener('input', renderProducts);
  document.getElementById('priceMax').addEventListener('input', renderProducts);
  document.getElementById('clearFilters').addEventListener('click', () => {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    document.querySelectorAll('[data-avail]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-avail="all"]').classList.add('active');
    activeFilter = 'all'; activeAvail = 'all';
    document.getElementById('shopSearch').value = '';
    document.getElementById('priceMin').value = '';
    document.getElementById('priceMax').value = '';
    document.getElementById('shopSort').value = 'default';
    renderProducts();
  });
  document.getElementById('gridViewBtn').addEventListener('click', () => {
    isListView = false;
    document.getElementById('productsGrid').classList.remove('list-view');
    document.getElementById('gridViewBtn').classList.add('active');
    document.getElementById('listViewBtn').classList.remove('active');
    renderProducts();
  });
  document.getElementById('listViewBtn').addEventListener('click', () => {
    isListView = true;
    document.getElementById('productsGrid').classList.add('list-view');
    document.getElementById('listViewBtn').classList.add('active');
    document.getElementById('gridViewBtn').classList.remove('active');
    renderProducts();
  });
  document.getElementById('cartClose').addEventListener('click', closeCart);
  document.getElementById('cartOverlay').addEventListener('click', closeCart);

  // URL param pre-filter
  const params = new URLSearchParams(location.search);
  const cat = params.get('cat');
  if (cat) {
    const btn = document.querySelector(`[data-cat="${cat}"]`);
    if (btn) { btn.click(); }
  }
});
</script>
</body>
</html>
